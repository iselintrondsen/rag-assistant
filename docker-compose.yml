version: '3.9'

services:
  # ─── PostgreSQL med pgvector ───────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-rag_assistant}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD er påkrevd}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-rag_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Node.js-applikasjon ───────────────────────────────────────────────────
  app:
    build: .
    container_name: rag-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:        production
      PORT:            ${PORT:-3000}
      OPENAI_API_KEY:  ${OPENAI_API_KEY:?OPENAI_API_KEY er påkrevd}
      DB_HOST:         db
      DB_PORT:         5432
      DB_NAME:         ${DB_NAME:-rag_assistant}
      DB_USER:         ${DB_USER:-postgres}
      DB_PASSWORD:     ${DB_PASSWORD:?DB_PASSWORD er påkrevd}
      CHAT_MODEL:      ${CHAT_MODEL:-gpt-4o-mini}
      ACCESS_PASSWORD: ${ACCESS_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

volumes:
  pgdata:
  uploads:
